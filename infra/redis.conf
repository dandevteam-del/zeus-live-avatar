# ═══════════════════════════════════════════════════════════════════════════════
# Zeus Live Avatar — Redis Configuration
# Opulent Bots LLC — All rights reserved
#
# Optimized for real-time event bus usage (pub/sub + ephemeral state).
# No persistence — all state is transient and reconstructed on restart.
# ═══════════════════════════════════════════════════════════════════════════════

# Memory limit — sufficient for event bus + session state
maxmemory 256mb
maxmemory-policy allkeys-lru

# Disable persistence (event bus only, no durable data)
save ""
appendonly no

# Connection management
tcp-keepalive 60
timeout 300

# Logging
loglevel notice

# Security — bind to all interfaces within Docker network
bind 0.0.0.0
protected-mode no
